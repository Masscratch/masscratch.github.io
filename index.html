<!DOCTYPE html>
<html lang="zh-HK" data-theme="light" data-size="md">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masscratch 星商相昇 - YLMASS 2026-27</title>
    <style>
        /* --- Apple Aesthetic Design System --- */
        :root {
            --bg-color: #000000;
            --card-bg: rgba(22, 22, 23, 0.8);
            --text-main: #f5f5f7;
            --text-sub: #86868b;
            --accent: #2997ff;
            --nav-bg: rgba(22, 22, 23, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --font-main: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            --card-gap: 1.5rem;
            --overlay-bg: rgba(0, 0, 0, 0.4);
            
            --hero-ig-bg: rgba(255, 255, 255, 0.06);
            --hero-ig-text: #f5f5f7;
            --hero-ig-border: rgba(255, 255, 255, 0.15);

            --portal-back-bg: rgba(28, 28, 30, 0.95);
            --portal-back-border: rgba(255, 255, 255, 0.15);
            --close-btn-bg: rgba(255, 255, 255, 0.1);
            --close-btn-hover: rgba(255, 255, 255, 0.2);
            --close-btn-text: #ffffff;
            --avatar-bg-start: #3a3a3c;
            --avatar-bg-end: #1c1c1e;

            --cookie-bg: rgba(28, 28, 30, 0.9);
            --cookie-border: rgba(255, 255, 255, 0.15);
        }

        [data-theme="light"] {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1d1d1f;
            --text-sub: #6e6e73;
            --accent: #0071e3;
            --nav-bg: rgba(245, 245, 247, 0.8);
            --border: rgba(0, 0, 0, 0.1);
            --overlay-bg: rgba(255, 255, 255, 0.4);
            
            --hero-ig-bg: #1d1d1f;
            --hero-ig-text: #ffffff;
            --hero-ig-border: transparent;

            --portal-back-bg: rgba(255, 255, 255, 0.95);
            --portal-back-border: rgba(0, 0, 0, 0.1);
            --close-btn-bg: rgba(0, 0, 0, 0.05);
            --close-btn-hover: rgba(0, 0, 0, 0.1);
            --close-btn-text: #1d1d1f;
            --avatar-bg-start: #e5e5ea;
            --avatar-bg-end: #ffffff;

            --cookie-bg: rgba(255, 255, 255, 0.95);
            --cookie-border: rgba(0, 0, 0, 0.1);
        }

        html[data-size="sm"] { font-size: 14px; }
        html[data-size="md"] { font-size: 16px; }
        html[data-size="lg"] { font-size: 18px; }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body.modal-open {
            overflow: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 48px;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
        }

        .logo {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: -0.5px;
        }

        .nav-actions {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 1.5rem;
            background: transparent;
        }

        .school-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-sub);
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
            max-width: 95%;
        }

        .cabinet-title {
            font-size: calc(1.6rem + 4.5vw);
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-main);
            margin-bottom: 1.2rem;
            line-height: 1.15;
            white-space: nowrap;
            width: 100%;
            max-width: 100vw;
        }

        .hero-desc {
            font-size: 1.15rem;
            color: var(--text-sub);
            max-width: 90%;
            line-height: 1.45;
            margin-bottom: 2.5rem;
        }

        .hero-desc br {
            display: block;
            content: "";
            margin-top: 0.35rem;
        }

        .hero-ig-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background-color: var(--hero-ig-bg);
            color: var(--hero-ig-text);
            border: 1px solid var(--hero-ig-border);
            text-decoration: none;
            width: 260px;
            max-width: 90%;
            height: 46px;
            border-radius: 23px;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.2s;
        }

        .hero-ig-btn:active {
            transform: scale(0.97);
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* --- Content Container & Grid --- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 1.2rem;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            column-gap: 1.5rem;
            row-gap: var(--card-gap);
        }

        /* --- Standard Front Cards --- */
        .card-static {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.8rem;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: border-color 0.3s, background-color 0.3s;
        }

        .card-static:active {
            background-color: rgba(128, 128, 128, 0.1);
        }

        .role-badge {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .member-name {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .card-arrow {
            position: absolute;
            bottom: 1.2rem;
            right: 1.2rem;
            color: var(--text-sub);
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Fullscreen Card Portal --- */
        .flip-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            pointer-events: none;
            display: none;
            perspective: 2000px;
            background-color: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            transition: background-color 0.5s ease, backdrop-filter 0.5s ease;
        }

        .flip-overlay.is-active {
            display: block;
            pointer-events: auto;
        }

        .flip-overlay.is-blurred {
            background-color: var(--overlay-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .portal-card {
            position: absolute;
            transform-style: preserve-3d;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .portal-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .portal-front {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .portal-back {
            background: var(--portal-back-bg);
            border: 1px solid var(--portal-back-border);
            color: var(--text-main);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            transition: background-color 0.5s ease, border-color 0.5s ease;
        }

        .back-container {
            max-width: 360px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: scale(0.92) translateY(8px);
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1) 0.15s;
            padding: 1rem 0;
            margin: auto 0;
        }

        .flip-overlay.is-flipped .back-container {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .back-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: var(--avatar-bg-start);
            border: 3px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .back-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.1rem;
        }

        .back-role {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }

        .back-bio {
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.5;
            margin-bottom: 1.8rem;
            text-align: center;
            padding: 0 0.5rem;
        }

        .back-ig-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 0.75rem 2rem;
            border-radius: 22px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 8px 16px rgba(220, 39, 67, 0.2);
        }

        .portal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--close-btn-bg);
            border: none;
            color: var(--close-btn-text);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1100;
            opacity: 0;
        }
        
        .flip-overlay.is-flipped .portal-close {
            opacity: 0.8;
        }

        /* --- Settings Drawer --- */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 290px;
            height: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid var(--border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.15);
            z-index: 150;
            transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 5rem 1.5rem 1.5rem;
        }

        .settings-panel.is-open { right: 0; }
        .setting-group { margin-bottom: 2rem; }
        .setting-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 0.6rem;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
            gap: 0.4rem;
        }

        .setting-btn-opt {
            background: rgba(128,128,128,0.12);
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 0.55rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .setting-btn-opt.active {
            background: var(--accent);
            color: #ffffff;
        }

        /* --- Scalable & Perfect Cookie Banner --- */
        .cookie-banner {
            position: fixed;
            bottom: -300px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 860px; 
            background: var(--cookie-bg);
            border: 1px solid var(--cookie-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cookie-banner.is-visible {
            bottom: 24px;
        }

        /* Fixed absolute sizes prevent text scaling layout breakages */
        .cookie-text {
            font-size: 14px !important;
            line-height: 1.45 !important;
            color: var(--text-main);
            text-align: left;
            flex: 1;
        }

        .cookie-text span {
            color: var(--text-sub);
            display: block;
            margin-top: 4px;
            font-size: 12px !important;
            text-align: left;
        }

        .cookie-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            align-items: center;
            flex-shrink: 0;
        }

        .cookie-btn {
            padding: 10px 20px;
            font-size: 13.5px !important;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .cookie-btn-accept {
            background-color: var(--text-main);
            color: var(--bg-color);
        }

        .cookie-btn-decline {
            background-color: rgba(128, 128, 128, 0.15);
            color: var(--text-sub);
        }

        /* --- Responsive Media Queries --- */
        @media (min-width: 768px) {
            :root { --card-gap: 2.5rem; }
            .cabinet-title { 
                font-size: 3.8rem; 
                letter-spacing: -2px; 
                margin-bottom: 1.5rem;
                white-space: nowrap;
            }
            .hero-desc { 
                font-size: 1.5rem; 
                margin-bottom: 2.5rem; 
                max-width: 900px;
            }
            header { padding: 0 2rem; }
            .card-static:hover { border-color: var(--accent); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); }
            .card-static:hover .card-arrow { transform: translateX(4px); opacity: 1; }
            .hero-ig-btn:hover { transform: translateY(-2px) scale(1.02); background-color: rgba(255, 255, 255, 0.12); }
            [data-theme="light"] .hero-ig-btn:hover { background-color: #333336; opacity: 0.9; }
            .portal-close:hover { background: var(--close-btn-hover); opacity: 1 !important; }
            .settings-panel { width: 320px; right: -350px; padding: 6rem 2rem 2rem; }
            
            /* Enforce horizontal alignment layout on larger screens */
            .cookie-banner {
                flex-direction: row !important;
                align-items: center;
                justify-content: space-between;
                gap: 24px;
                padding: 20px 28px;
            }
        }
    </style>
</head>

                    <h3 class="back-name" id="backName">姓名</h3>
                    <div class="back-role" id="backRole">職位</div>
                    <p class="back-bio" id="backBio">個人簡介載入中...</p>
                    <a href="https://instagram.com" target="_blank" class="back-ig-btn" id="backIgLink">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C5.829 0 5.556.01 4.703.048 3.85.088 3.269.222 2.76.42a3.9 3.9 0 0 0-1.417.923A3.9 3.9 0 0 0 .42 2.76C.222 3.268.087 3.85.048 4.7.01 5.555 0 5.827 0 8.001c0 2.172.01 2.444.048 3.297.04.852.174 1.433.372 1.942.205.526.478.972.923 1.417.444.445.89.719 1.416.923.51.198 1.09.333 1.942.372C5.555 15.99 5.827 16 8 16s2.444-.01 3.298-.048c.851-.04 1.434-.174 1.943-.372a3.9 3.9 0 0 0 1.416-.923c.445-.445.718-.891.923-1.417.197-.509.332-1.09.372-1.942C15.99 10.445 16 10.173 16 8s-.01-2.445-.048-3.299c-.04-.851-.175-1.433-.372-1.941a3.9 3.9 0 0 0-.923-1.417A3.9 3.9 0 0 0 13.24.42c-.51-.198-1.092-.333-1.943-.372C10.443.01 10.172 0 7.998 0zm-.717 1.442h.718c2.136 0 2.389.007 3.232.046.78.035 1.204.166 1.486.275.373.145.64.319.92.599s.453.546.598.92c.11.281.24.705.275 1.485.039.843.047 1.096.047 3.231s-.008 2.389-.047 3.232c-.035.78-.166 1.203-.275 1.485a2.5 2.5 0 0 1-.599.919c-.28.28-.546.453-.92.598-.28.11-.704.24-1.485.276-.843.038-1.096.047-3.232.047s-2.39-.009-3.233-.047c-.78-.036-1.203-.166-1.485-.276a2.5 2.5 0 0 1-.92-.598 2.5 2.5 0 0 1-.6-.92c-.109-.281-.24-.705-.275-1.485-.038-.843-.046-1.096-.046-3.233s.008-2.388.046-3.231c.036-.78.166-1.204.276-1.486.145-.373.319-.64.599-.92s.546-.453.92-.598c.282-.11.705-.24 1.485-.276.738-.034 1.024-.044 2.515-.045zm4.988 1.328a.96.96 0 1 0 0 1.92.96.96 0 0 0 0-1.92m-4.27 1.122a4.109 4.109 0 1 0 0 8.217 4.109 4.109 0 0 0 0-8.217m0 1.441a2.667 2.667 0 1 1 0 5.334 2.667 2.667 0 0 1 0-5.334"/></svg>
                        Instagram
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Cookie Consent Banner -->
    <div class="cookie-banner" id="cookieBanner">
        <div class="cookie-text" id="txtCookiePrompt">
            本網站使用 Cookie 以提升你的個人化瀏覽體驗。
            <span>我們會記住你選擇的語言、外觀主題與字體大小。</span>
        </div>
        <div class="cookie-actions">
            <button class="cookie-btn cookie-btn-decline" id="btnCookieDecline">拒絕</button>
            <button class="cookie-btn cookie-btn-accept" id="btnCookieAccept">同意並記住</button>
        </div>
    </div>

    <script>
        // --- i18n Data ---
        const i18n = {
            'zh': {
                school: "元朗商會中學",
                slogan: "2026-2027 學生會候選內閣 — 凝聚星光，與商相伴，破浪齊昇。",
                teamTitle: "內閣幹事陣容",
                theme: "外觀設計", lang: "語言切換", textSize: "字體大小",
                dark: "深色", light: "淺色",
                heroIgText: "Masscratch 官方 IG",
                cookiePrompt: "本網站使用 Cookie 以提升你的個人化瀏覽體驗。<span>我們會記住你選擇的語言、外觀主題與字體大小。</span>",
                cookieAccept: "同意並記住", cookieDecline: "拒絕",
                roles: {
                    president: "主席", vice_president: "副主席", general_affairs: "總務", 
                    designer: "美術", publication: "宣傳", academics: "學術",
                    treasurer: "財務", welfare: "福利", secretary: "文書"
                },
                names: {
                    'Xu Chak Long': '許澤朗', 'Ng Hoi Laam': '吳凱嵐', 'Ku Ho Yin': '古皓然',
                    'Yip Tsz Leong': '葉子亮', 'Chan Yu Hin': '陳宇軒', 'Lam Queenie': '林紫羽',
                    'Yik Ho Sing': '易昊昇', 'Chan Wai Ki': '陳偉棋', 'Lam Wai Ho': '林偉豪',
                    'Chan Yu Ting': '陳宇霆', 'Tsang Yiu Mak': '曾耀墨', 'Chu Ho Him': '朱灝謙',
                    'Yau Chi Kiu': '邱梓橋', 'Cheng Yu Hon Mac': '鄭裕瀚'
                },
                bio: "你好！我是「Masscratch 星商相昇」的一分子。承蒙信任，今年我將全力以赴為元朗商會中學全體同學服務，傾聽你們的聲音，爭取更多福利，豐富我們的校園生活！"
            },
            'en-us': {
                school: "YUEN LONG MERCHANTS ASSOCIATION SECONDARY SCHOOL",
                slogan: "2026-2027 Student Council Candidate Cabinet<br>Uniting stars, growing together with our campus.",
                teamTitle: "Cabinet Members",
                theme: "Appearance", lang: "Language", textSize: "Text Size",
                dark: "Dark", light: "Light",
                heroIgText: "Masscratch Official IG",
                cookiePrompt: "This website uses cookies to enhance your personalized browsing experience. <span>We remember your preference for theme, language, and font size.</span>",
                cookieAccept: "Accept & Remember", cookieDecline: "Decline",
                roles: {
                    president: "President", vice_president: "Vice-President", general_affairs: "General Affairs", 
                    designer: "Designer", publication: "Publication Officer", academics: "Academics Affair",
                    treasurer: "Treasurer", welfare: "Welfare Officer", secretary: "Secretary"
                },
                names: {
                    'Xu Chak Long': 'Xu Chak Long', 'Ng Hoi Laam': 'Ng Hoi Laam', 'Ku Ho Yin': 'Ku Ho Yin',
                    'Yip Tsz Leong': 'Yip Tsz Leong', 'Chan Yu Hin': 'Chan Yu Hin', 'Lam Queenie': 'Lam Queenie',
                    'Yik Ho Sing': 'Yik Ho Sing', 'Chan Wai Ki': 'Chan Wai Ki', 'Lam Wai Ho': 'Lam Wai Ho',
                    'Chan Yu Ting': 'Chan Yu Ting', 'Tsang Yiu Mak': 'Tsang Yiu Mak', 'Chu Ho Him': 'Chu Ho Him',
                    'Yau Chi Kiu': 'Yau Chi Kiu', 'Cheng Yu Hon Mac': 'Cheng Yu Hon Mac'
                },
                bio: "Hello! As a dedicated member of Masscratch, I am honored to stand for election. We aim to bring vibrant innovations, organize dynamic activities, and act as an authentic voice for all students at YLMASS."
            }
        };

        const members = [
            { role: 'president', key: 'Xu Chak Long', emoji: '🌟', ig: 'chaklong_xu' },
            { role: 'vice_president', key: 'Ng Hoi Laam', emoji: '⚡', ig: 'hoilaam_ng' },
            { role: 'vice_president', key: 'Ku Ho Yin', emoji: '☄️', ig: 'hoyin_ku' },
            { role: 'general_affairs', key: 'Yip Tsz Leong', emoji: '🛠️', ig: 'tszleong_yip' },
            { role: 'general_affairs', key: 'Chan Yu Hin', emoji: '⚙️', ig: 'yuhin_chan' },
            { role: 'designer', key: 'Lam Queenie', emoji: '🎨', ig: 'queenie_lam' },
            { role: 'designer', key: 'Yik Ho Sing', emoji: '🖌️', ig: 'hosing_yik' },
            { role: 'publication', key: 'Chan Wai Ki', emoji: '📢', ig: 'waiki_chan' },
            { role: 'publication', key: 'Lam Wai Ho', emoji: '🤝', ig: 'waiho_lam' },
            { role: 'academics', key: 'Chan Yu Ting', emoji: '📚', ig: 'yuting_chan' },
            { role: 'treasurer', key: 'Tsang Yiu Mak', emoji: '💰', ig: 'yiumak_tsang' },
            { role: 'welfare', key: 'Chu Ho Him', emoji: '🎁', ig: 'hohim_chu' },
            { role: 'welfare', key: 'Yau Chi Kiu', emoji: '🍀', ig: 'chikiu_yau' },
            { role: 'secretary', key: 'Cheng Yu Hon Mac', emoji: '✍️', ig: 'yuhonmac_cheng' }
        ];

        // --- Core Cookie Utilities ---
        function setCookie(name, value, days = 365) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Strict`;
        }

        function getCookie(name) {
            return document.cookie.split('; ').reduce((r, v) => {
                const parts = v.split('=');
                return parts[0] === name ? decodeURIComponent(parts[1]) : r;
            }, '');
        }

        // --- Initial State Machine ---
        let currentLang = 'zh';
        let isCookieAllowed = getCookie('cookieConsent') === 'allowed';

        let savedTheme = isCookieAllowed ? (getCookie('prefTheme') || 'light') : 'light';
        let savedSize = isCookieAllowed ? (getCookie('prefSize') || 'md') : 'md';
        let savedLang = isCookieAllowed ? (getCookie('prefLang') || 'zh') : 'zh';

        currentLang = savedLang;
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.documentElement.setAttribute('data-size', savedSize);

        // --- UI Rendering ---
        function renderGrid() {
            const grid = document.getElementById('teamGrid');
            grid.innerHTML = '';
            members.forEach((m) => {
                const card = document.createElement('div');
                card.className = 'card-static';
                card.innerHTML = `
                    <div class="role-badge">${i18n[currentLang].roles[m.role]}</div>
                    <div class="member-name">${i18n[currentLang].names[m.key]}</div>
                    <div class="card-arrow">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"></path></svg>
                    </div>
                `;
                card.addEventListener('click', () => triggerFlipPortal(card, m));
                grid.appendChild(card);
            });
        }

        // --- Portal Core Animation ---
        let activeOriginCard = null;
        function triggerFlipPortal(originCard, memberData) {
            activeOriginCard = originCard;
            const rect = originCard.getBoundingClientRect();
            const portal = document.getElementById('flipPortal');
            const portalCard = document.getElementById('portalCard');
            const portalFront = document.getElementById('portalFrontContent');
            
            portalFront.innerHTML = originCard.innerHTML;
            document.getElementById('backAvatar').innerText = memberData.emoji;
            document.getElementById('backName').innerText = i18n[currentLang].names[memberData.key];
            document.getElementById('backRole').innerText = i18n[currentLang].roles[memberData.role];
            document.getElementById('backBio').innerText = i18n[currentLang].bio;

            const targetHandle = memberData.ig || 'masscratch';
            document.getElementById('backIgLink').href = `https://instagram.com/${targetHandle}`;

            portalCard.style.transition = 'none';
            portalCard.style.transform = 'none';
            portalCard.style.top = `${rect.top}px`;
            portalCard.style.left = `${rect.left}px`;
            portalCard.style.width = `${rect.width}px`;
            portalCard.style.height = `${rect.height}px`;
            
            portal.style.display = 'block';
            portal.classList.remove('is-blurred', 'is-flipped');
            originCard.style.opacity = '0';
            portal.offsetHeight;

            portal.classList.add('is-active');
            document.body.classList.add('modal-open');
            
            portalCard.style.transition = 'all 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
            portal.classList.add('is-blurred');

            const isMobile = window.innerWidth < 768;
            const targetWidth = isMobile ? window.innerWidth * 0.92 : Math.min(window.innerWidth * 0.88, 480);
            const targetHeight = isMobile ? window.innerHeight * 0.85 : Math.min(window.innerHeight * 0.75, 580);
            
            portalCard.style.top = `${(window.innerHeight - targetHeight) / 2}px`;
            portalCard.style.left = `${(window.innerWidth - targetWidth) / 2}px`;
            portalCard.style.width = `${targetWidth}px`;
            portalCard.style.height = `${targetHeight}px`;
            portalCard.style.transform = 'rotateY(180deg)';
            
            setTimeout(() => portal.classList.add('is-flipped'), 80);
        }

        function closePortal() {
            const portal = document.getElementById('flipPortal');
            const portalCard = document.getElementById('portalCard');
            if (!activeOriginCard) return;
            const rect = activeOriginCard.getBoundingClientRect();

            portal.classList.remove('is-flipped', 'is-blurred');
            portalCard.style.top = `${rect.top}px`;
            portalCard.style.left = `${rect.left}px`;
            portalCard.style.width = `${rect.width}px`;
            portalCard.style.height = `${rect.height}px`;
            portalCard.style.transform = 'rotateY(0deg)';

            setTimeout(() => {
                portal.classList.remove('is-active');
                portal.style.display = 'none';
                activeOriginCard.style.opacity = '1';
                activeOriginCard = null;
                document.body.classList.remove('modal-open');
            }, 500);
        }

        document.getElementById('closePortal').addEventListener('click', e => { e.stopPropagation(); closePortal(); });
        document.getElementById('flipPortal').addEventListener('click', e => { if (e.target === document.getElementById('flipPortal')) closePortal(); });

        // --- Drawer Control ---
        const toggleSettings = document.getElementById('toggleSettings');
        const settingsPanel = document.getElementById('settingsPanel');
        toggleSettings.addEventListener('click', e => { e.stopPropagation(); settingsPanel.classList.toggle('is-open'); });
        
        document.addEventListener('click', e => { 
            if (!settingsPanel.contains(e.target) && !toggleSettings.contains(e.target)) {
                settingsPanel.classList.remove('is-open'); 
            }
        });

        // --- Settings Options Trigger ---
        document.querySelectorAll('.setting-btn-opt').forEach(btn => {
            btn.addEventListener('click', function() {
                const optType = this.dataset.opt;
                const val = this.dataset.value;

                this.parentElement.querySelectorAll('.setting-btn-opt').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                if (optType === 'theme') {
                    document.documentElement.setAttribute('data-theme', val);
                    if (isCookieAllowed) setCookie('prefTheme', val);
                } else if (optType === 'size') {
                    document.documentElement.setAttribute('data-size', val);
                    if (isCookieAllowed) setCookie('prefSize', val);
                } else if (optType === 'lang') {
                    currentLang = val;
                    if (isCookieAllowed) setCookie('prefLang', val);
                    updateLanguage();
                }
            });
        });

        function syncActiveButtons() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const currentSize = document.documentElement.getAttribute('data-size');
            
            document.querySelectorAll('[data-opt="theme"]').forEach(b => b.classList.toggle('active', b.dataset.value === currentTheme));
            document.querySelectorAll('[data-opt="size"]').forEach(b => b.classList.toggle('active', b.dataset.value === currentSize));
            document.querySelectorAll('[data-opt="lang"]').forEach(b => b.classList.toggle('active', b.dataset.value === currentLang));
        }

        function updateLanguage() {
            const data = i18n[currentLang];
            document.getElementById('txtSchool').innerText = data.school;
            document.getElementById('txtSlogan').innerHTML = data.slogan; 
            document.getElementById('txtTeamTitle').innerText = data.teamTitle;
            document.getElementById('lblTheme').innerText = data.theme;
            document.getElementById('lblLang').innerText = data.lang;
            document.getElementById('lblTextSize').innerText = data.textSize;
            document.getElementById('btnDark').innerText = data.dark;
            document.getElementById('btnLight').innerText = data.light;
            document.getElementById('btnHeroIg').querySelector('span').innerText = data.heroIgText;
            document.getElementById('txtCookiePrompt').innerHTML = data.cookiePrompt;
            document.getElementById('btnCookieAccept').innerText = data.cookieAccept;
            document.getElementById('btnCookieDecline').innerText = data.cookieDecline;
            renderGrid();
            syncActiveButtons();
        }

        // --- Cookie Banner Operational Logic ---
        const cookieBanner = document.getElementById('cookieBanner');
        
        window.addEventListener('load', () => {
            if (getCookie('cookieConsent') === '') {
                setTimeout(() => cookieBanner.classList.add('is-visible'), 1000);
            }
        });

        document.getElementById('btnCookieAccept').addEventListener('click', () => {
            isCookieAllowed = true;
            setCookie('cookieConsent', 'allowed');
            setCookie('prefTheme', document.documentElement.getAttribute('data-theme'));
            setCookie('prefSize', document.documentElement.getAttribute('data-size'));
            setCookie('prefLang', currentLang);
            cookieBanner.classList.remove('is-visible');
        });

        document.getElementById('btnCookieDecline').addEventListener('click', () => {
            isCookieAllowed = false;
            setCookie('cookieConsent', 'declined', 14);
            cookieBanner.classList.remove('is-visible');
        });

        // Initialize WebApp
        updateLanguage();
    </script>
</body>
</html>
